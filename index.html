<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类与AI的关系：主仆模式 VS 共生模式 - 辩论赛计时系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>人类与AI的关系：主仆模式 VS 共生模式</h1>
        </header>

        <!-- Top Progress Bar -->
        <div class="top-progress-bar">
            <div class="progress-stage" data-stage="1">
                <div class="progress-dot"></div>
                <div class="progress-label">开篇立论</div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-stage" data-stage="2">
                <div class="progress-dot"></div>
                <div class="progress-label">攻辩/申论</div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-stage" data-stage="3">
                <div class="progress-dot"></div>
                <div class="progress-label">自由辩论</div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-stage" data-stage="4">
                <div class="progress-dot"></div>
                <div class="progress-label">总结陈词</div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-stage" data-stage="5">
                <div class="progress-dot"></div>
                <div class="progress-label">互动环节</div>
            </div>
            <div class="progress-line"></div>
            <div class="progress-stage" data-stage="6">
                <div class="progress-dot"></div>
                <div class="progress-label">观众投票</div>
            </div>
        </div>

        <main>
            <div class="main-content">
                <!-- Left Section: Timer and Controls -->
                <div class="left-section">
                    <!-- Timer Display -->
                    <div class="timer-section">
                        <!-- Single Timer (for most stages) -->
                        <div id="singleTimer" class="timer-display-large">
                            <div id="currentTime" class="time-large" title="双击可编辑时长">03:00</div>
                            <div class="timer-progress">
                                <div id="progressBar" class="progress-fill"></div>
                            </div>
                        </div>

                        <!-- Voting Display (for voting stage) -->
                        <div id="votingTimer" class="voting-timer-display" style="display: none;">
                            <div class="voting-content">
                                <div class="voting-qr-section">
                                    <img id="votingQrCode" src="winer_voting.png" alt="投票二维码" class="voting-qr-large">
                                    <p id="votingHint" class="voting-timer-hint"></p>
                                </div>
                                <div class="voting-timer-section">
                                    <div id="votingTime" class="time-large" title="双击可编辑时长">01:30</div>
                                    <div class="timer-progress">
                                        <div id="votingProgressBar" class="progress-fill"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Dual Timer (for free debate) -->
                        <div id="dualTimer" class="dual-timer-container" style="display: none;">
                            <div class="dual-timer-body">
                                <div class="team-timer positive-side">
                                    <div class="team-label">正方</div>
                                    <div id="positiveTime" class="time-large" title="双击可编辑时长">04:00</div>
                                    <div class="timer-progress">
                                        <div id="positiveProgress" class="progress-fill"></div>
                                    </div>
                                </div>
                                <div class="team-timer negative-side">
                                    <div class="team-label">反方</div>
                                    <div id="negativeTime" class="time-large" title="双击可编辑时长">04:00</div>
                                    <div class="timer-progress">
                                        <div id="negativeProgress" class="progress-fill"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div class="controls">
                        <button id="startBtn" class="btn btn-primary">
                            <span class="btn-icon">▶</span>
                            开始
                        </button>
                        <button id="pauseBtn" class="btn btn-secondary" disabled>
                            <span class="btn-icon">⏸</span>
                            暂停
                        </button>
                        <button id="resetBtn" class="btn btn-secondary">
                            <span class="btn-icon">↻</span>
                            重置
                        </button>
                        <button id="nextBtn" class="btn btn-success">
                            <span class="btn-icon">→</span>
                            下一环节
                        </button>
                    </div>
                </div>

                <!-- Right Section: Stage Details -->
                <div class="right-section">
                    <div class="stage-details">
                        <h3 id="stageTitle">第一阶段：开篇立论</h3>
                        <div id="stageDetailsList" class="details-list">
                            <!-- Will be populated by JavaScript -->
                        </div>
                    </div>
                    
                    <!-- Free Debate Switch Button (Hidden by default) -->
                    <div id="freeDebateSwitch" class="free-debate-switch-container" style="display: none;">
                        <button id="switchSideBtn" class="btn btn-warning btn-switch-large">
                            <span class="btn-icon">⇄</span>
                            切换发言方
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
